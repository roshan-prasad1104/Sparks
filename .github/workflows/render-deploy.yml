name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing RENDER_API_KEY or RENDER_SERVICE_ID secrets. See repo settings.";
            exit 1;
          fi

          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          RESP=$(curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')

          echo "$RESP" > /tmp/render-deploy-response.json
          echo "Response:" && cat /tmp/render-deploy-response.json

          DEPLOY_ID=$(jq -r '.id // .serviceDeployId // .message' /tmp/render-deploy-response.json 2>/dev/null || true)
          if [ "$DEPLOY_ID" = "null" ] || [ -z "$DEPLOY_ID" ]; then
            echo "Failed to parse deploy id from response. Exiting.";
            exit 1;
          fi

          echo "Deploy id: $DEPLOY_ID"

          # Poll for deploy status
          echo "Waiting for deploy to finish..."
          while true; do
            STATUS_JSON=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")
            STATUS=$(echo "$STATUS_JSON" | jq -r '.status' 2>/dev/null || true)
            echo "Status: $STATUS"
            if [ "$STATUS" = "succeeded" ]; then
              echo "Deploy succeeded";
              break;
            fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "cancelled" ]; then
              echo "Deploy failed: $STATUS"
              echo "$STATUS_JSON"
              exit 1;
            fi
            sleep 5
          done

      - name: Show service URL
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          SERVICE_JSON=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID")
          echo "Service info:" && echo "$SERVICE_JSON"
          echo "Public URL:" && echo "$SERVICE_JSON" | jq -r '.serviceDetails?.url // .url // .externalUrl'
